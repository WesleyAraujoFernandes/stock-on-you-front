<div class="container mt-4">
  <h2 class="mb-3">Categories</h2>

  <button class="btn btn-primary mb-3">
    New Category
  </button>

  <table class="table table-striped">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let category of categories">
        <td>{{ category.id }}</td>
        <td>{{ category.name }}</td>
      </tr>
    </tbody>
  </table>
</div>
